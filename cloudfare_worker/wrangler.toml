name = "dudu-transcription"
main = "worker.js"
compatibility_date = "2025-01-01"

[ai]
binding = "AI"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Secrets — set these via CLI, never commit them:
#   wrangler secret put API_KEY          (optional: protects the /upload endpoint)
